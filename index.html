<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HardScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-purple: #f8f4ff;
            --main-purple: #c3a6ff;
            --dark-purple: #9279c3;
            --light-purple: #e9dfff;
            --text-color: #5a5a5a;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Itim', cursive;
            background-color: var(--bg-purple);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            padding: 1.5rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(195, 166, 255, 0.2);
            text-align: center;
            border: 4px solid var(--light-purple);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--dark-purple);
        }

        #webcam-container {
            position: relative;
            margin: 0 auto 1.5rem;
            border-radius: 20px;
            overflow: hidden;
            background: #fafafa;
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1 / 1;
            border: 6px solid var(--light-purple);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #countdown-text {
            position: absolute;
            font-size: 6rem;
            color: var(--main-purple);
            z-index: 20;
            text-shadow: 3px 3px 0px var(--white);
            display: none;
            pointer-events: none;
        }

        #loading-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--main-purple);
        }

        .heart-loader {
            width: 45px;
            height: 45px;
            background-color: var(--main-purple);
            clip-path: path('M24 7.3C24 7.3 28.5 2 34.5 2C40.5 2 45 7 45 13C45 19 39 25 24 37C9 25 3 19 3 13C3 7 7.5 2 13.5 2C19.5 2 24 7.3 24 7.3Z');
            animation: heartBeat 1.2s infinite ease-in-out;
            margin-bottom: 10px;
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: scale(0.9);
            }

            50% {
                transform: scale(1.1);
            }
        }

        #scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--main-purple);
            box-shadow: 0 0 15px var(--main-purple);
            animation: scan 3s infinite ease-in-out;
            z-index: 10;
            display: none;
        }

        @keyframes scan {

            0%,
            100% {
                top: 5%;
                opacity: 0.3;
            }

            50% {
                top: 95%;
                opacity: 1;
            }
        }

        button {
            background-color: var(--main-purple);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-family: 'Itim', cursive;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0px var(--dark-purple);
            margin-top: 10px;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #capture-btn {
            display: none;
            background-color: var(--main-purple);
        }

        #result-card {
            margin-top: 1.2rem;
            padding: 1.2rem;
            border-radius: 20px;
            background: var(--light-purple);
            display: none;
            border: 2px dashed var(--main-purple);
            text-align: left;
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-title {
            font-weight: bold;
            color: var(--dark-purple);
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .precision-badge {
            display: inline-block;
            background: var(--white);
            color: var(--dark-purple);
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        p {
            line-height: 1.5;
            color: #555;
            font-size: 1rem;
            margin-top: 10px;
        }

        .retry-btn {
            background-color: var(--white);
            color: var(--dark-purple);
            border: 2px solid var(--main-purple);
            box-shadow: none;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>HardScan AI</h1>

        <div id="webcam-container">
            <div id="countdown-text">3</div>
            <div id="loading-view">
                <div class="heart-loader"></div>
                <span id="loading-status">พร้อมแล้วสแกนเลย!! (/≧▽≦)/</span>
            </div>
            <div id="scanner-overlay"></div>
        </div>

        <button id="start-btn" onclick="init()">เริ่มสแกนอุปกรณ์</button>
        <button id="capture-btn" onclick="captureImage()">กดเพื่อสแกน</button>

        <div id="result-card">
            <div id="result-content"></div>
            <button class="retry-btn" onclick="location.reload()">สแกนใหม่อีกครั้ง</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/8pxhTqNde/";
        const hardwareData = {
            "case": {
                thName: "เคสคอมพิวเตอร์",
                desc: "โครงสร้างหลักสำหรับติดตั้งและปกป้องส่วนประกอบภายในระบบ พร้อมออกแบบช่องทางไหลเวียนอากาศเพื่อระบายความร้อน"
            },
            "mainBoard": {
                thName: "เมนบอร์ด",
                desc: "แผงวงจรหลักที่ทำหน้าที่เป็นศูนย์กลางการเชื่อมต่อและควบคุมการสื่อสารระหว่างฮาร์ดแวร์ทุกส่วนในระบบ"
            },
            "mouse": {
                thName: "เมาส์",
                desc: "อุปกรณ์นำเข้าข้อมูลสำหรับควบคุมตัวชี้ตำแหน่งและสั่งการระบบผ่านอินเทอร์เฟซผู้ใช้งาน"
            },
            "ram": {
                thName: "แรม",
                desc: "หน่วยความจำหลักความเร็วสูงแบบชั่วคราว ทำหน้าที่พักข้อมูลเพื่อให้ CPU เข้าถึงและประมวลผลได้อย่างรวดเร็ว"
            },
            "gpu": {
                thName: "การ์ดจอ",
                desc: "หน่วยประมวลผลกราฟิกที่ออกแบบมาเพื่อจัดการการเรนเดอร์ภาพและวิดีโอโดยเฉพาะ เพื่อประสิทธิภาพการแสดงผลขั้นสูง"
            },
            "screen": {
                thName: "จอภาพ",
                desc: "อุปกรณ์แสดงผลหลัก ทำหน้าที่แปลงสัญญาณอิเล็กทรอนิกส์เป็นข้อมูลภาพ ตัวอักษร และวิดีโอ"
            },
            "cpu": {
                thName: "ซีพียู",
                desc: "ไมโครโพรเซสเซอร์ที่เป็นหัวใจหลักในการคำนวณและบริหารจัดการชุดคำสั่งทั้งหมดของระบบคอมพิวเตอร์"
            },
            "powerSupply": {
                thName: "พาวเวอร์ซัพพลาย",
                desc: "อุปกรณ์แปลงแรงดันไฟฟ้าและจ่ายพลังงานกระแสตรงที่เสถียรให้แก่ชิ้นส่วนต่างๆ ภายในคอมพิวเตอร์"
            },
            "hardDisk": {
                thName: "ฮาร์ดดิสก์",
                desc: "หน่วยความจำถาวรสำหรับจัดเก็บระบบปฏิบัติการ ซอฟต์แวร์ และไฟล์ข้อมูลดิจิทัลในระยะยาว"
            },
            "keyboard": {
                thName: "คีย์บอร์ด",
                desc: "อุปกรณ์นำเข้าข้อมูลหลักสำหรับการป้อนชุดคำสั่งและตัวอักษรเข้าสู่ระบบคอมพิวเตอร์ผ่านการกดปุ่ม"
            }
        };

        let model, webcam, isLive = false, animationId;

        async function init() {
            document.getElementById("start-btn").style.display = "none";
            document.getElementById("loading-status").innerText = "กำลังเตรียมกล้อง... o(*￣▽￣*)ブ";

            model = await tmImage.load(URL + "model.json", URL + "metadata.json");

            const size = 300;
            const flip = false; 
            webcam = new tmImage.Webcam(size, size, flip); 
    
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();

            document.getElementById("loading-view").style.display = "none";
            const canvas = webcam.canvas;
            canvas.style.transform = "scaleX(1)";
            
            document.getElementById("webcam-container").appendChild(canvas);

            startCountdown();
        }

        function startCountdown() {
            const countEl = document.getElementById("countdown-text");
            countEl.style.display = "block";
            let count = 3;
            countEl.innerText = count;

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countEl.innerText = count;
                } else {
                    clearInterval(interval);
                    countEl.style.display = "none";
                    showCaptureButton();
                }
            }, 1000);
        }

        function showCaptureButton() {
            document.getElementById("scanner-overlay").style.display = "block";
            document.getElementById("capture-btn").style.display = "block";
            isLive = true;
            window.requestAnimationFrame(updateWebcam);
        }

        function updateWebcam() {
            if (!isLive) return;
            webcam.update();
            animationId = window.requestAnimationFrame(updateWebcam);
        }

        async function captureImage() {
            isLive = false;
            window.cancelAnimationFrame(animationId);

            document.getElementById("capture-btn").style.display = "none";
            document.getElementById("scanner-overlay").style.display = "none";

            const prediction = await model.predict(webcam.canvas);
            let topPrediction = { probability: 0 };

            for (let i = 0; i < model.getTotalClasses(); i++) {
                if (prediction[i].probability > topPrediction.probability) {
                    topPrediction = prediction[i];
                }
            }

            if (topPrediction.probability >= 0.95) {
                const name = topPrediction.className;
                const percent = (topPrediction.probability * 100).toFixed(0);
                const data = hardwareData[name] || { thName: name, desc: "ไม่พบข้อมูลอุปกรณ์นี้ในฐานข้อมูล" };
                displayResult(data.thName, data.desc, percent);
            } else {
                displayResult("ไม่พบอุปกรณ์ (っ °Д °;)っ", "ลองเล็งถ่ายใหม่อีกครั้งนะคะ");
            }
        }

        function displayResult(displayName, desc, percent = null) {
            if (webcam) webcam.stop();
            const resultCard = document.getElementById("result-card");
            resultCard.style.display = "block";

            document.getElementById("result-content").innerHTML =
                percent ?
                    `<div class="result-title">ตรวจพบ: ${displayName}</div><div class="precision-badge">ความน่าจะเป็น: ${percent}%</div><p>${desc}</p>` :
                    `<div class="result-title" style="color:#d96c6c">${displayName}</div><p>${desc}</p>`;
        }
    </script>
</body>


</html>
